<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Família Inácio 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
/* ✅ EVITA O CELULAR "AUMENTAR" O TEXTO AUTOMATICAMENTE */


body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Cinzel', serif;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background: url("https://www.transparenttextures.com/patterns/white-linen.png");
  background-color: #f5f1e8;
  overflow-y: auto;
  padding: 20px 10px;
}

/* CARD INICIAL */
.card-inicial {
  background: white;
  padding: 30px 20px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
  max-width: 95vw;
}

.card-inicial h1 {
  color: #b68b2d;
  font-size: 24px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.card-inicial p {
  font-size: 18px;
  margin-bottom: 15px;
}

button {
  padding: 12px 30px;
  border-radius: 30px;
  border: 2px solid #d4af37;
  background: transparent;
  color: #b68b2d;
  cursor: pointer;
  font-size: 16px;
  transition: 0.4s;
}

button:hover {
  background: linear-gradient(45deg,#d4af37,#f6e27a,#d4af37);
  color: white;
}

/* CARD CONVITE */
.card-convite {
  display: none;
  background: white;
  width: 95vw;
  max-width: 400px;
  padding: 30px 20px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  font-size: 14px; /* ✅ SEU TAMANHO */
  line-height: 1.6;
  color: black;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* CONFETES CONTÍNUOS DOURADOS */
.confete {
  position: fixed;
  top: -20px;
  border-radius: 50%;
  opacity: 0.9;
  z-index: 9999;
  animation-name: cair;
  animation-timing-function: linear;
  animation-iteration-count: 1;
}

@keyframes cair {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
  100% { transform: translate(50px, 100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>

<body>

<div class="card-inicial" id="inicio">
  <h1>FAMÍLIA INÁCIO 2026</h1>
  <p>Save The Date</p>
  <button onclick="abrirConvite()">Abrir Convite</button>
</div>

<div class="card-convite" id="conviteTexto"></div>

<audio id="musica" src="convite/musica.mp3"></audio>

<script>
const mensagem = `NOSSO CARDÁPIO DO CAFÉ DA MANHÃ!!!

Hummmmmmm gostinho de casa de vó ♥️

•Leite
•Café 
•Suco
•Margarina
•Requeijão cremoso
•Mussarela fatiada 
•Presunto fatiado
•Frutas

•Pão francês pequeno
•Pãozinho Santo Antônio 
•Biscoitinho de queijo
•Pãozinho de queijo 
•Biscoito de rodela
•Broinha de fubá 
•Broinha de amaendoim
•Rosca comum
•Rosquinha húngara 
•Rosquinha frita

•Enroladinho de queijo
•Enroladinho de queijo de doce
•Bolo de chocolate
•Bolo comum com caldinha açucarada 

BOM APETITE !!!😋`;

let confeteInterval;

function abrirConvite() {
  document.getElementById("inicio").style.display = "none";
  const convite = document.getElementById("conviteTexto");
  convite.style.display = "block";
  document.getElementById("musica").play();

  iniciarConfetes();

  let i = 0;
  function digitar() {
    if (i < mensagem.length) {
      convite.innerHTML += mensagem[i] === "\n" ? "<br>" : mensagem[i];
      i++;
      setTimeout(digitar, 80);
    } else {
      setTimeout(pararConfetes, 5000);
    }
  }
  digitar();
}

function iniciarConfetes() {
  const cores = ["#FFD700","#FFC700","#FFB700"];
  confeteInterval = setInterval(() => {
    const confete = document.createElement("div");
    confete.classList.add("confete");

    confete.style.left = Math.random() * window.innerWidth + "px";
    const size = 6 + Math.random() * 12;
    confete.style.width = confete.style.height = size + "px";

    confete.style.background = `linear-gradient(45deg, ${cores[Math.floor(Math.random()*cores.length)]}, ${cores[Math.floor(Math.random()*cores.length)]})`;
    confete.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(confete);
    confete.addEventListener("animationend", () => confete.remove());
  }, 100);
}

function pararConfetes() {
  clearInterval(confeteInterval);
}
</script>

</body>
</html>
