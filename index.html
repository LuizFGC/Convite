<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Família Inácio 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Cinzel', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("https://www.transparenttextures.com/patterns/white-linen.png");
  background-color: #f5f1e8;
  overflow: hidden;
  padding: 10px;
}

/* CARD INICIAL */
.card-inicial {
  background: white;
  padding: 30px 20px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
  max-width: 95vw;
}

.card-inicial h1 {
  color: #b68b2d;
  font-size: 24px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.card-inicial p {
  font-size: 18px;
  margin-bottom: 15px;
}

button {
  padding: 12px 30px;
  border-radius: 30px;
  border: 2px solid #d4af37;
  background: transparent;
  color: #b68b2d;
  cursor: pointer;
  font-size: 16px;
  transition: 0.4s;
}

button:hover {
  background: linear-gradient(45deg,#d4af37,#f6e27a,#d4af37);
  color: white;
}

/* CARD CONVITE */
.card-convite {
  display: none;
  background: white;
  width: 95vw;
  max-width: 400px;
  padding: 30px 20px;
  border-radius: 20px;
  border: 2px solid #d4af37;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
  font-size: 18px;
  line-height: 1.6;
  color: #b68b2d;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* CONFETES DOURADOS PROFISSIONAL */
.confete {
  position: fixed;
  width: 8px;
  height: 14px;
  background: linear-gradient(45deg, #FFD700, #FFC700, #FFB700);
  top: -20px;
  z-index: 9999;
  border-radius: 50%;
  opacity: 0.9;
  animation-name: cair, girar;
  animation-timing-function: linear;
  animation-iteration-count: 1;
}

/* Queda vertical */
@keyframes cair {
  0% { transform: translateY(0) translateX(0); opacity: 1; }
  100% { transform: translateY(100vh) translateX(50px); opacity: 0; }
}

/* Rotação para efeito natural */
@keyframes girar {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(720deg); }
}
</style>
</head>

<body>

<div class="card-inicial" id="inicio">
  <h1>FAMÍLIA INÁCIO 2026</h1>
  <p>Save The Date</p>
  <button onclick="abrirConvite()">Abrir Convite</button>
</div>

<div class="card-convite" id="conviteTexto"></div>

<audio id="musica" src="convite/musica.mp3"></audio>

<script>
const mensagem = `Vem aí o SEGUNDO ENCONTRO DA NOSSA FAMÍLIA INÁCIO

JÁ TEMOS DATA MARCADA
30/05/2026

Local: BURITI ALEGRE

HORÁRIO PARA O INÍCIO DA NOSSA FESTA 9:00 da manhã
Sem hora pra finalizar…
Vai depender da nossa empolgação 😊

Contamos com a presença de todos vocês!`;

function abrirConvite() {
  document.getElementById("inicio").style.display = "none";
  const convite = document.getElementById("conviteTexto");
  convite.style.display = "block";
  document.getElementById("musica").play();

  let i = 0;

  function digitar() {
    if (i < mensagem.length) {
      convite.innerHTML += mensagem[i] === "\n" ? "<br>" : mensagem[i];
      i++;
      setTimeout(digitar, 80);
    } else {
      soltarConfetes();
    }
  }

  digitar();
}

// Confetes dourados profissionais
function soltarConfetes() {
  const quantidade = 120; // Mais confetes
  for (let j = 0; j < quantidade; j++) {
    const confete = document.createElement("div");
    confete.classList.add("confete");

    confete.style.left = Math.random() * window.innerWidth + "px";
    confete.style.width = confete.style.height = (8 + Math.random() * 12) + "px";
    confete.style.animationDuration = (4 + Math.random() * 3) + "s"; // queda mais longa
    confete.style.transform = `rotate(${Math.random()*360}deg)`;

    document.body.appendChild(confete);

    confete.addEventListener("animationend", () => confete.remove());
  }
}
</script>

</body>
</html>
